        takeaway:"Critique of the leadership development industry: striking disconnect between enormous scale ($billions annually) and weak scientific evidence base. Diagnoses atheoretical programs, no control groups, no follow-up beyond reaction surveys, vague success criteria. Solutions: theory-driven design specifying mechanisms, longitudinal behavioral outcomes in work settings, randomized/quasi-experimental designs.",
        rq:"Why doesn't the leadership development industry produce credible evidence?",
        theory:"Causal inference; program evaluation.",
        method:"Critical chapter review.",
        findings:"Programs atheoretical, no controls, no longitudinal evaluation, tautological success criteria.",
        implications:"Essential reference for critiquing the practice-science gap." },
      { cite:"Eva et al. (2021)", full:"Eva, N., Wolfram Cox, J., Tse, H.H.M., & Lowe, K.B. (2021). From competency to conversation: A multi-perspective approach to collective leadership development. LQ, 32(5), 101346.",
        takeaway:"Critique of the dominant competency-based model — identifies a set of skills and trains them in individual leaders — for perpetuating a hero-leader model that's both empirically questionable and practically limiting. Proposes a conversation-based approach building relational, dialogic, sense-making skills enabling leaders + followers to co-construct shared meaning. Leadership development = developing collective capacity.",
        rq:"How should leadership development shift from competency-based to collective conversation-based approaches?",
        theory:"Collective leadership; relational/dialogic perspectives.",
        method:"Conceptual paper with framework + agenda.",
        findings:"Competency model perpetuates hero-leader; conversation/sense-making approach better fits distributed leadership theory.",
        implications:"Connects to shared/distributed leadership; reframes development at system rather than individual level." },
    ]},

  { id:10, name:"Gender & Leadership", date:"Nov 6", icon:"♀️",
    papers:[
      { cite:"Eagly & Johnson (1990)", full:"Eagly, A.H., & Johnson, B.T. (1990). Gender and leadership style: A meta-analysis. Psychological Bulletin, 108(2), 233-256.",
        takeaway:"Landmark meta-analysis of gender and leadership style. Women tend toward more democratic/participative styles; men toward more autocratic/directive. Critically, these differences are SUBSTANTIALLY MODERATED by organizational context — when roles are strongly gender-typed or require specific behaviors, gender differences attenuate or disappear because role expectations override gender socialization.",
        rq:"Do men and women lead differently?",
        theory:"Social role theory; gender socialization.",
        method:"Meta-analysis.",
        findings:"Small but consistent differences in lab; nearly disappear in field organizational roles; democratic style more pronounced in women.",
        implications:"Gender differences are real but contextually situated; sets stage for subsequent gender-leadership research." },
      { cite:"Heilman & Eagly (2008)", full:"Heilman, M.E., & Eagly, A.H. (2008). Gender stereotypes are alive, well, and busy producing workplace discrimination. IOP, 1(4), 393-398.",
        takeaway:"Synthesizes how gender stereotypes produce systematic disadvantages for women in leadership. Distinguishes descriptive stereotypes (what women ARE like) from prescriptive (what women SHOULD be like). Women face a 'double bind': effective leadership requires traits (assertive, decisive) inconsistent with prescriptive female norms (warm, communal). Adopting leader behaviors → backlash; conforming to female norms → judged as lacking competence.",
        rq:"How do gender stereotypes produce workplace discrimination against female leaders?",
        theory:"Lack of fit; role congruity; descriptive vs. prescriptive stereotypes.",
        method:"Conceptual/integrative review.",
        findings:"Descriptive + prescriptive stereotypes produce double-bind; both backlash and competence-deficit attributions block women.",
        implications:"Articulates structural mechanisms requiring organizational/cultural change for gender equality in leadership." },
      { cite:"Lau et al. (2023)", full:"Lau, V.W., Scott, V.L., Warren, M.A., & Bligh, M.C. (2023). Moving from problems to solutions: Gender equality interventions using an ecological systems approach. JOB, 44(2), 399-419.",
        takeaway:"Reviews gender equality interventions using an ecological systems framework: individual-level (training, mentoring), organizational-level (structural changes to hiring, promotion, evaluation), societal-level (policy, culture). Individual-level interventions show limited lasting change because they target individuals within biased systems. Organizational-level structural interventions (anonymized applications, standardized criteria) show much stronger effects.",
        rq:"Which gender equality interventions actually work, and at what level?",
        theory:"Ecological systems theory.",
        method:"Systematic review of interventions.",
        findings:"Individual interventions weak; structural interventions strong; multi-level approaches most effective.",
        implications:"Locates the problem in systems, not individual deficiencies; structural change is the highest-leverage intervention." },
      { cite:"Johnson et al. (2008)", full:"Johnson, S.K., Murphy, S.E., Zewdie, S., & Reichard, R.J. (2008). The strong, sensitive type: Effects of gender stereotypes and leadership prototypes on evaluation of male and female leaders. OBHDP, 106(1), 39-60.",
        takeaway:"Connects ILT literature with gender literature. Leader prototypes in Western cultures are systematically male-typed (agency, assertiveness, competence) overlapping with men far more than women. Creates structural disadvantage: women must overcome BOTH categorization barrier (mismatch with prototype) AND prescriptive norm barrier (penalty for adopting male-typed behaviors that would match the prototype). Experimental evidence: women face no-win character of the double bind.",
        rq:"How do leader prototypes interact with gender stereotypes to produce evaluation bias?",
        theory:"ILT + social role theory.",
        method:"Experimental + correlational studies.",
        findings:"Leader prototype is male-typed; women in 'sensitive' style evaluated worse than men in same style; women in 'insensitive' style evaluated even worse.",
        implications:"Integrates cognitive (ILT) + social role mechanisms into unified account of gender inequality in leadership perception." },
    ]},

  { id:11, name:"Measurement", date:"Nov 13", icon:"📏",
    papers:[
      { cite:"Rush et al. (1977)", full:"Rush, M.C., Thomas, J.C., & Lord, R.G. (1977). Implicit leadership theory: A potential threat to internal validity of leader behavior questionnaires. OBHP, 20, 93-110.",
        takeaway:"Foundational measurement critique. Demonstrates that follower cognitive schemas associating certain leader behaviors with certain performance outcomes contaminate leadership ratings. Elegant experiment: manipulating only the described performance outcome of a leader's group changes how followers rate the leader's behaviors — even with all behavioral descriptions held constant. Ratings reflect schema-driven attribution, NOT observation.",
        rq:"Do follower behavioral ratings reflect actual behavior or schema-driven inference?",
        theory:"ILT; attribution theory.",
        method:"Experimental manipulation of performance information.",
        findings:"Performance information alone changes leader-behavior ratings; ratings reflect attribution rather than observation.",
        implications:"Foundational text for the measurement validity critique; threats persist in modern leadership rating research." },
      { cite:"Brown & Keeping (2005)", full:"Brown, D.J., & Keeping, L.M. (2005). Elaborating the construct of transformational leadership: The role of affect. LQ, 16(2), 245-273.",
        takeaway:"Follower affect toward / liking of the leader substantially inflates TFL ratings. Followers who like their leader report higher TFL even after controlling for actual behavior. When liking is statistically controlled, TFL → outcomes relationships attenuate substantially. Are TFL ratings measures of specific behaviors, or expressions of general positivity? Implication: all follower-rated leadership measures are potentially contaminated by affective halo.",
        rq:"Do TFL ratings reflect specific leader behaviors or general affect toward the leader?",
        theory:"Affect contamination; TFL measurement validity.",
        method:"Empirical study controlling for liking.",
        findings:"Affect inflates TFL ratings; TFL → outcomes relationships substantially attenuate when affect controlled.",
        implications:"Methodological caution for all follower-rated leadership measurement." },
      { cite:"Yammarino et al. (2020)", full:"Yammarino, F.J., Cheong, M., Kim, J., & Tsai, C.-Y. (2020). Is leadership more than 'I like my boss'? RPHRM, 38, 1-55.",
        takeaway:"Investigation across TFL, LMX, authentic leadership of whether ratings can be distinguished from simply how much the follower likes the leader. Central finding: across multiple designs, follower affect predicts leadership ratings more strongly than any objective behavioral measure. When liking is controlled, predictive relationships substantially attenuate. Fundamental challenge to the construct validity of the entire measurement apparatus.",
        rq:"Are standard leadership ratings empirically distinct from follower liking?",
        theory:"Construct validity; affect contamination.",
        method:"Multi-study program across multiple measures.",
        findings:"Liking dominates ratings; when controlled, outcome relationships shrink dramatically across measures.",
        implications:"Profound challenge to construct validity of leadership measurement; calls for behavioral observation/ESM." },
      { cite:"Hansbrough et al. (2015)", full:"Hansbrough, T.K., Lord, R.G., & Schyns, B. (2015). Reconsidering the accuracy of follower leadership ratings. LQ, 26, 220-237.",
        takeaway:"Develops theoretical model of leadership rating accuracy specifying cognitive conditions under which ratings reflect actual behavior vs. ILT-driven inference. Accurate ratings require: adequate observation opportunity; sufficient cognitive resources to process behavior carefully; low ILT salience; motivation to rate accurately. Most organizational contexts violate these conditions — ratings should be expected to be systematically inaccurate.",
        rq:"Under what cognitive conditions are follower leadership ratings accurate?",
        theory:"Cognitive accuracy; ILT contamination.",
        method:"Theoretical model + propositions.",
        findings:"Specifies four cognitive prerequisites for accuracy; most settings violate them.",
        implications:"Predicts when leadership ratings should be trusted and when not — most existing research falls in 'not.'" },
      { cite:"Hansbrough et al. (2021)", full:"Hansbrough, T.K., Lord, R.G., Schyns, B., et al. (2021). Do you remember? Rater memory systems and leadership measurement. LQ, 32, 101455.",
        takeaway:"Applies cognitive science research on memory systems to leadership measurement. Distinguishes episodic memory (specific events) vs. semantic memory (stored generalizations). Survey items ostensibly ask about specific behaviors but followers retrieve semantic memory — general impressions, inferred traits — not episodic. Survey leadership measures are systematically measuring trait inferences, NOT behavioral observation, regardless of item wording.",
        rq:"Which memory systems do followers use when responding to behavioral leadership items?",
        theory:"Memory systems (episodic vs. semantic).",
        method:"Conceptual paper integrating cognitive memory research.",
        findings:"Survey items invoke semantic memory; behavioral ratings systematically reflect trait inference.",
        implications:"Fundamental measurement reconceptualization needed; ESM, behavioral diaries, real-time observation engage episodic memory." },
      { cite:"Banks et al. (2021)", full:"Banks, G.C., Woznyji, H.M., & Mansfield, C.A. (2021). Where is 'behavior' in organizational behavior? A call for revolution. LQ, 101581.",
        takeaway:"Examines the irony: despite 'behavior' centrality in OB self-definition, most studies do NOT measure actual behavior but follower perceptions via retrospective survey — shaped by schemas and affect, not behavioral reality. Catalogues methods in LQ; near-complete absence of direct behavioral observation, ESM, passive sensing. Proposes three alternatives: behavioral coding of recorded interactions, ESM in real time, passive sensing (wearables, digital traces).",
        rq:"Does leadership research actually measure behavior, and what alternatives exist?",
        theory:"Behavioral observation methodology.",
        method:"Systematic methodological audit + alternatives proposal.",
        findings:"<1% of LQ studies measure actual behavior; ESM, behavioral coding, passive sensing systematically absent.",
        implications:"Without these alternatives, field cannot answer fundamental questions about what leaders actually do." },
      { cite:"Arnulf et al. (2014)", full:"Arnulf, J.K., Larsen, K.R., Martinsen, Ø.L., & Bong, C.H. (2014). Predicting survey responses: How and why semantics shape survey statistics. PLoS ONE, 9.",
        takeaway:"Demonstrates that semantic similarity between survey items produces statistical correlations even when there is NO real psychological relationship between constructs — 'semantic confounding.' Compelling demonstration: syntactically random item strings semantically similar to leadership items generate correlations comparable to those in published studies. Substantial portions of published inter-construct correlations may be linguistic artifacts.",
        rq:"Are survey correlations driven by psychological relationships or semantic similarity of items?",
        theory:"Semantic confounding; psychometric ontology.",
        method:"Computational analyses of item semantics; reanalysis of published correlations.",
        findings:"Semantic similarity alone produces strong correlations; ~50% of leadership-outcome correlations could be linguistic artifact.",
        implications:"Methods needed to separate semantic from substantive associations; cross-language validation; semantically orthogonal instruments." },
      { cite:"Arnulf & Larsen (2021)", full:"Arnulf, J.K., & Larsen, K.R. (2021). Semantic and ontological structures of psychological attributes. In Measuring and Modeling Persons and Situations. Academic Press.",
        takeaway:"Extends semantic confounding argument to fundamental ontological level — questions whether psychological constructs (including leadership constructs) are real psychological entities existing independently of language, or artifacts of linguistic practice. Goes beyond measurement: constructs themselves may be socially constituted through language. If so, factor analyses and meta-analyses cannot reveal 'true' construct relationships.",
        rq:"Are psychological constructs real entities or linguistic artifacts?",
        theory:"Ontological status of psychological constructs.",
        method:"Conceptual/philosophical analysis.",
        findings:"Argues many constructs may be linguistic, not psychological; profound implications for research programs built on them.",
        implications:"Calls for greater philosophical sophistication about construct ontology in organizational research." },
      { cite:"Alvesson & Einola (2019)", full:"Alvesson, M., & Einola, K. (2019). Warning for excessive positivity: Authentic leadership and other traps in leadership studies. LQ, 30, 383-395.",
        takeaway:"Critiques 'excessive positivity trap' in leadership research. Constructs like authentic leadership are fundamentally normative/idealized rather than descriptive/analytical — they define what leadership SHOULD be then measure conformity, which is tautological not scientific. Measurement instruments function more like value-laden questionnaires about being a good person than theory-driven measures of behaviors with testable causal effects.",
        rq:"Do popular leadership constructs (especially authentic leadership) confuse normative ideals with empirical analysis?",
        theory:"Critical leadership studies.",
        method:"Critical conceptual analysis.",
        findings:"Authentic leadership defined tautologically; measurement is value-laden; serves to legitimate managerial authority.",
        implications:"Distinguishes scientific from normative inquiry; calls for less ideologically loaded constructs." },
    ]},

  { id:12, name:"What's Wrong with Leadership?", date:"Nov 20", icon:"⚠️",
    papers:[
      { cite:"Antonakis et al. (2010)", full:"Antonakis, J., Bendahan, S., Jacquart, P., & Lalive, R. (2010). On making causal claims: A review and recommendations. LQ, 21, 1086-1120.",
        takeaway:"Methodological manifesto for causal inference in leadership research. Documents endemic reliance on correlational designs that cannot distinguish whether leadership causes outcomes, outcomes cause leadership perceptions, or a third variable causes both. Provides taxonomy of causal strategies: randomized experiments, instrumental variables, regression discontinuity, natural experiments. Argues accumulated leadership research cannot answer the fundamental causal question.",
        rq:"How can leadership research establish credible causal claims?",

// ═══════════════════════════════════════════════════════════════════
// ROUTING
// ═══════════════════════════════════════════════════════════════════

const navStack = [];

function show(view){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById(view).classList.add('active');
  document.getElementById('scroll').scrollTop = 0;
}

function setHeader(title, sub, showBack){
  document.getElementById('headerTitle').textContent = title;
  document.getElementById('headerSub').textContent = sub || '';
  document.getElementById('backBtn').classList.toggle('show', !!showBack);
}

function go(route, push=true){
  if(push) navStack.push(route);
  location.hash = route;
  render(route);
}

function goBack(){
  navStack.pop();
  const prev = navStack[navStack.length-1] || 'home';
  location.hash = prev === 'home' ? '' : prev;
  render(prev);
}

function render(route){
  if(!route || route==='home'){
    setHeader('Comps Review','Doctoral Comprehensive Exam',false);
    show('view-home');
    return;
  }
  if(route==='flashcards'){
    setHeader('Flash Cards','Tap card to flip · Leadership',true);
    ensureDeck();
    renderFlash();
    show('view-flashcards');
    return;
  }
  if(route==='topic-leadership'){
    setHeader('Leadership','LEAD 601 · 12 weekly modules',true);
    renderWeeks();
    show('view-topic-leadership');
    return;
  }
  const wMatch = route.match(/^week-(\d+)$/);
  if(wMatch){
    const w = WEEKS.find(x=>x.id==wMatch[1]);
    setHeader(`Week ${w.id}: ${w.name}`, `${w.date} · ${w.papers.length} papers`, true);
    renderPapers(w);
    show('view-week');
    return;
  }
  const pMatch = route.match(/^paper-(\d+)-(\d+)$/);
  if(pMatch){
    const w = WEEKS.find(x=>x.id==pMatch[1]);
    const p = w.papers[pMatch[2]];
    setHeader(w.name, w.date, true);
    renderPaper(w,p);
    show('view-paper');
    return;
  }
  render('home');
}

function renderWeeks(){
  const html = WEEKS.map(w=>`
    <div class="list-row" onclick="go('week-${w.id}')">
      <div class="row-num">${w.id}</div>
      <div class="row-main">
        <div class="row-title">${w.icon} ${w.name}</div>
        <div class="row-sub">${w.date} · ${w.papers.length} papers</div>
      </div>
      <div class="row-chev">›</div>
    </div>`).join('');
  document.getElementById('weeksList').innerHTML = html;
}

function renderPapers(w){
  document.getElementById('weekHero').innerHTML = `
    <h1>${w.icon} ${w.name}</h1>
    <p>Week ${w.id} · ${w.date} · ${w.papers.length} readings</p>`;
  const html = w.papers.map((p,i)=>`
    <div class="list-row" onclick="go('paper-${w.id}-${i}')">
      <div class="row-num">${i+1}</div>
      <div class="row-main">
        <div class="row-title">${p.cite}</div>
        <div class="row-sub">${escapeAttr(p.full).slice(0,80)}…</div>
      </div>
      <div class="row-chev">›</div>
    </div>`).join('');
  document.getElementById('papersList').innerHTML = html;
}

function renderPaper(w,p){
  document.getElementById('paperBody').innerHTML = `
    <div class="paper-cite">${p.cite}</div>
    <div class="paper-meta">${p.full}</div>

    <div class="takeaway-card">
      <div class="takeaway-label">⭐ Key Takeaway</div>
      <div class="takeaway-body">${p.takeaway}</div>
    </div>

    <div class="section-label">Detailed Breakdown</div>

    <div class="detail-section">
      <h3>🎯 Research Question / Goal</h3>
      <p>${p.rq}</p>
    </div>

    <div class="detail-section">
      <h3>📚 Theory / Framework</h3>
      <p>${p.theory}</p>
    </div>

    <div class="detail-section">
      <h3>🔬 Method</h3>
      <p>${p.method}</p>
    </div>

    <div class="detail-section">
      <h3>📊 Key Findings</h3>
      <p>${p.findings}</p>
    </div>

    <div class="detail-section">
      <h3>💡 Implications / Contribution</h3>
      <p>${p.implications}</p>
    </div>`;
}

function escapeAttr(s){return (s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;')}

// ═══════════════════════════════════════════════════════════════════
// FLASH CARDS
// ═══════════════════════════════════════════════════════════════════

let DECK = [];
let deckIdx = 0;

function buildFullDeck(){
  const cards = [];
  WEEKS.forEach(w=>{
    w.papers.forEach((p,i)=>{
      cards.push({week:w, paper:p, paperIdx:i});
    });
  });
  return cards;
}

function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  return arr;
}

function ensureDeck(){
  if(DECK.length === 0){
    DECK = shuffle(buildFullDeck());
    deckIdx = 0;
  }
}

function shuffleCards(){
  DECK = shuffle(buildFullDeck());
  deckIdx = 0;
  renderFlash();
}

function jumpToFirst(){
  deckIdx = 0;
  renderFlash();
}

function flipCard(){
  document.getElementById('flashCard').classList.toggle('flipped');
}

function nextCard(){
  if(deckIdx < DECK.length-1){
    deckIdx++;
    renderFlash();
  }
}

function prevCard(){
  if(deckIdx > 0){
    deckIdx--;
    renderFlash();
  }
}

function openCurrentPaper(){
  const c = DECK[deckIdx];
  go(`paper-${c.week.id}-${c.paperIdx}`);
}

function renderFlash(){
  const card = DECK[deckIdx];
  const w = card.week;
  const p = card.paper;

  // reset flip state
  document.getElementById('flashCard').classList.remove('flipped');

  document.getElementById('flashFront').innerHTML = `
    <div class="week-chip">${w.icon} Week ${w.id} · ${w.date}</div>
    <div class="week-icon">📄</div>
    <div class="cite">${p.cite}</div>
    <div class="full">${p.full}</div>
    <div class="tap-hint">TAP TO REVEAL</div>
  `;

  document.getElementById('flashBack').innerHTML = `
    <div class="back-cite">${p.cite}</div>
    <div class="back-week">${w.icon} ${w.name} · ${w.date}</div>

    <h4>⭐ Takeaway</h4>
    <p>${p.takeaway}</p>

    <h4>🎯 Research Question</h4>
    <p>${p.rq}</p>

    <h4>📚 Theory</h4>
    <p>${p.theory}</p>

    <h4>🔬 Method</h4>
    <p>${p.method}</p>

    <h4>📊 Key Findings</h4>
    <p>${p.findings}</p>

    <h4>💡 Implications</h4>
    <p>${p.implications}</p>

    <div class="tap-hint">TAP TO FLIP BACK</div>
  `;

  // progress bar + counter
  const pct = ((deckIdx+1)/DECK.length)*100;
  document.getElementById('flashFill').style.width = pct+'%';
  document.getElementById('flashCounter').textContent = `${deckIdx+1} / ${DECK.length}`;

  // disable prev/next at boundaries
  document.getElementById('flashPrev').disabled = (deckIdx === 0);
  document.getElementById('flashNext').disabled = (deckIdx === DECK.length-1);
}

// keyboard shortcuts (desktop testing)
document.addEventListener('keydown', e=>{
  if(!document.getElementById('view-flashcards').classList.contains('active')) return;
  if(e.key === 'ArrowRight') nextCard();
  else if(e.key === 'ArrowLeft') prevCard();
  else if(e.key === ' ' || e.key === 'Enter'){ e.preventDefault(); flipCard(); }
});

// swipe gestures
let touchStartX = 0, touchStartY = 0;
document.addEventListener('touchstart', e=>{
  if(!document.getElementById('view-flashcards').classList.contains('active')) return;
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, {passive:true});
document.addEventListener('touchend', e=>{
  if(!document.getElementById('view-flashcards').classList.contains('active')) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if(Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy)*1.5){
    if(dx < 0) nextCard(); else prevCard();
  }
}, {passive:true});

// ─── Init ───
window.addEventListener('hashchange',()=>{
  const r = location.hash.slice(1) || 'home';
  render(r);
});

// Init from hash or home
(function init(){
  const r = location.hash.slice(1) || 'home';
  navStack.push(r);
  render(r);
})();
</script>
</body>
</html>
